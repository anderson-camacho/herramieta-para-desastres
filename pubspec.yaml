name: signal_scope
description: SignalScope MVP for lawful local signal observation on Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  intl: ^0.20.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  geolocator: ^14.0.3
  url_launcher: ^6.3.2
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

